server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # This line is what makes React Router / client-side routes work
    # on refresh — without it, refreshing a deep link like /dashboard
    # would 404 because nginx would look for a literal file named "dashboard".
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache built JS/CSS assets aggressively — Vite fingerprints filenames
    # so this is safe.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
